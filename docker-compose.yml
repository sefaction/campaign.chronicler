services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    pull_policy: always
    environment:
      POSTGRES_DB: campaign_chronicler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ${POSTGRES_DATA_PATH:-/mnt/user/appdata/campaign-chronicler/postgres}:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"

  backend:
    build:
      context: ${GIT_CONTEXT}
      dockerfile: backend/Dockerfile
    pull_policy: build
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/campaign_chronicler}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://192.168.1.2:15173,http://localhost:15173}
    depends_on:
      - postgres
    volumes:
      - ${BACKEND_DATA_PATH:-/mnt/user/appdata/campaign-chronicler/backend}:/app/backend/data
      - ${BACKEND_UPLOADS_PATH:-/mnt/user/appdata/campaign-chronicler/backend/uploads}:/app/uploads
    ports:
      - "${BACKEND_HOST_PORT:-18000}:8000"

  frontend:
    build:
      context: ${GIT_CONTEXT}
      dockerfile: frontend/Dockerfile
    pull_policy: build
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://192.168.1.2:${BACKEND_HOST_PORT:-18000}}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-15173}:5173"
