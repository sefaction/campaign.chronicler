services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: campaign_chronicler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
  backend:
    build: ./backend
    env_file: .env.example
    volumes:
      - media_uploads:/app/uploads
    depends_on: [postgres]
    ports: ["8000:8000"]
  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on: [backend]
    ports: ["5173:5173"]
volumes:
  postgres_data:
  media_uploads:
