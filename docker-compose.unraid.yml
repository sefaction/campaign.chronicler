services:
  postgres:
    image: postgres:16
    pull_policy: always
    environment:
      POSTGRES_DB: campaign_chronicler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/sefaction/campaign-chronicler/backend:main}
    pull_policy: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/campaign_chronicler}
      SECRET_KEY: ${SECRET_KEY:-change-me}
    depends_on:
      - postgres
    volumes:
      - media_uploads:/app/uploads
    ports:
      - "${BACKEND_HOST_PORT:-18000}:8000"

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/sefaction/campaign-chronicler/frontend:main}
    pull_policy: always
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${BACKEND_HOST_PORT:-18000}}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-15173}:5173"

volumes:
  postgres_data:
  media_uploads:
